<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preset Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: system-ui, -apple-system, sans-serif; padding: 40px; }
  h1 { font-size: 28px; margin-bottom: 8px; }
  .subtitle { color: #888; margin-bottom: 40px; font-size: 14px; }
  h2 { font-size: 20px; margin: 32px 0 16px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; font-weight: 400; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 16px; }
  .preset { border-radius: 12px; overflow: hidden; background: #1a1a1a; }
  .preset .gradient { height: 80px; display: flex; }
  .preset .gradient div { flex: 1; }
  .preset .banner { height: 60px; background: linear-gradient(90deg, var(--s1), var(--s2), var(--s3), var(--s4), var(--s5), var(--s6)); border-radius: 0; }
  .preset .info { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .preset .name { font-weight: 600; font-size: 15px; }
  .preset .tag { font-size: 11px; padding: 3px 8px; border-radius: 99px; background: #333; color: #999; }
  .preset .tag.new { background: #2a3a2a; color: #6c6; }
  .preset .tag.moved { background: #3a2a2a; color: #c86; }
  .preset .hex-row { padding: 0 16px 12px; display: flex; gap: 6px; }
  .preset .hex-row span { font-size: 10px; color: #666; font-family: monospace; }
  .section-note { color: #666; font-size: 13px; margin-bottom: 20px; }
</style>
</head>
<body>

<h1>Bubble Banner — Preset Preview</h1>
<p class="subtitle">Proposed reorganization: 2 categories (Soft & Vivid), 20 total presets</p>

<h2>Soft</h2>
<p class="section-note">Muted, pastel, dreamy palettes</p>
<div class="grid" id="soft"></div>

<h2>Vivid</h2>
<p class="section-note">Saturated, bold, high-energy palettes</p>
<div class="grid" id="vivid"></div>

<script>
const presets = {
  soft: [
    { name: "Haze", stops: ["#FFD166","#FF9E64","#FF6E91","#D490D4","#8ABFFF","#A5F3FC"], tag: "existing" },
    { name: "Vaporwave", stops: ["#FF6AD5","#C774E8","#AD8CFF","#8795E8","#94D0FF","#9BFAFF"], tag: "existing" },
    { name: "Dusk", stops: ["#112136","#2D3954","#4F4F76","#767D9C","#A198B2","#C5B6CB"], tag: "existing" },
    { name: "Bloom", stops: ["#FD79A8","#E84393","#A29BFE","#6C5CE7","#00CEC9","#55EFC4"], tag: "moved", note: "from Vivid" },
    { name: "Vapour", stops: ["#844C3C","#F7CCC0","#E7D2CD","#FCFEFF","#91C4EE","#FCFEFF"], tag: "new", note: "peach + icy blue" },
    { name: "Glacier", stops: ["#3C7A5D","#C0F7D9","#DBEDE3","#D5CBCA","#FFFFFE","#FFFFFE"], tag: "new", note: "soft mint" },
    { name: "Linen", stops: ["#4F4879","#C5C0F7","#C7C6D3","#BCAF73","#FFFAE4","#FFFCEB"], tag: "new", note: "lavender + cream" },
    { name: "Petal", stops: ["#76486C","#F7C0E9","#DFCED9","#B7C186","#FAFEEB","#F9FFE2"], tag: "new", note: "pink + chartreuse" },
  ],
  vivid: [
    { name: "Miami", stops: ["#FF2A6D","#FF5C8D","#FF89B5","#05D9E8","#00B4D8","#48CAE4"], tag: "existing" },
    { name: "Tokyo", stops: ["#FF6E9C","#B97BFF","#7289FF","#60A0FF","#4ECDC4","#A0FFB5"], tag: "existing" },
    { name: "Flare", stops: ["#2D0059","#7B0080","#CC0044","#FF2200","#FF7700","#FFCC99"], tag: "existing" },
    { name: "Rosé", stops: ["#5D0041","#8A144F","#C01C3F","#E06A87","#F99684","#FFC6AA"], tag: "moved", note: "from Soft" },
    { name: "Twilight", stops: ["#0B1021","#1C2541","#3A506B","#5BC0BE","#9EE493","#F6F740"], tag: "moved", note: "from Dark" },
    { name: "Frostbite", stops: ["#360004","#BF4A4A","#B56F6B","#005954","#00C7BE","#A2FFF6"], tag: "moved", note: "from Dark" },
    { name: "Regal", stops: ["#30014B","#8F44C6","#9E7CBC","#E0C374","#9E7E00","#473700"], tag: "moved", note: "from Dark" },
    { name: "Ember", stops: ["#4A0001","#DC0E0E","#B89D99","#004344","#00A5B4","#8BEFFD"], tag: "moved", note: "from Dark" },
    { name: "Copper", stops: ["#2F1100","#EE8B44","#E1AA87","#77A6D2","#307FC0","#0F3E61"], tag: "new", note: "orange ↔ blue" },
    { name: "Jungle", stops: ["#0A621A","#44EE5B","#BBCFBB","#FF8CD1","#FFF1F8","#85516E"], tag: "new", note: "green + pink" },
    { name: "Acid", stops: ["#597215","#C5F939","#C9D2BB","#FFB5FE","#FFFCFF","#936B96"], tag: "new", note: "lime + purple" },
    { name: "Gilded", stops: ["#2B0027","#C544B6","#9E7096","#E0B400","#FFF6DE","#7D6930"], tag: "new", note: "magenta + gold" },
  ]
};

function renderPreset(p) {
  const tagClass = p.tag === "new" ? "new" : p.tag === "moved" ? "moved" : "";
  const tagText = p.tag === "new" ? "NEW" : p.tag === "moved" ? "MOVED" : "";
  const noteText = p.note ? ` — ${p.note}` : "";

  return `
    <div class="preset">
      <div class="gradient">${p.stops.map(s => `<div style="background:${s}"></div>`).join("")}</div>
      <div class="banner" style="--s1:${p.stops[0]};--s2:${p.stops[1]};--s3:${p.stops[2]};--s4:${p.stops[3]};--s5:${p.stops[4]};--s6:${p.stops[5]}"></div>
      <div class="info">
        <span class="name">${p.name}</span>
        ${tagText ? `<span class="tag ${tagClass}">${tagText}${noteText}</span>` : ""}
      </div>
      <div class="hex-row">${p.stops.map(s => `<span>${s}</span>`).join("")}</div>
    </div>
  `;
}

document.getElementById("soft").innerHTML = presets.soft.map(renderPreset).join("");
document.getElementById("vivid").innerHTML = presets.vivid.map(renderPreset).join("");
</script>
</body>
</html>
